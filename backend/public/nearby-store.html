<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby Hospitals & Pharmacies — SafetyFirst AI</title>
  <meta name="description" content="Find hospitals and pharmacies near you with real-time map view.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080e1a;
      --surface: rgba(255, 255, 255, 0.045);
      --surface-h: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --sidebar-w: 240px;
      --radius: 16px;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* animated bg mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(0, 212, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LAYOUT ===== */
    .layout {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(8, 14, 26, 0.9);
      backdrop-filter: blur(24px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 16px;
      position: relative;
      transition: width 0.3s ease;
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar.collapsed {
      width: 72px;
    }

    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .sidebar-footer {
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 14px;
    }

    .sidebar.collapsed .nav-section-label {
      display: none;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .collapse-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .collapse-btn:hover {
      color: var(--text);
      background: var(--surface-h);
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 12px;
      margin: 16px 0 8px;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--surface-h);
    }

    .nav-item.active {
      color: var(--accent);
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.15);
    }

    .nav-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .nav-label {
      white-space: nowrap;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* ===== MAP AREA ===== */
    .map-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(8, 14, 26, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 5;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-h);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .filter-btn.active-filter {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
      color: var(--accent);
    }

    .radius-select {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-h);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .radius-select option {
      background: var(--bg);
      color: var(--text);
    }

    .locate-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #0072ff);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .locate-btn:hover {
      opacity: 0.85;
      box-shadow: 0 4px 14px rgba(0, 114, 255, 0.4);
    }

    /* ===== CONTENT ROW ===== */
    .content-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== MAP ===== */
    #map {
      flex: 1;
      height: 100%;
      z-index: 1;
    }

    /* leaflet dark tiles override */
    .leaflet-tile {
      filter: brightness(0.85) saturate(0.9);
    }

    .leaflet-container {
      background: var(--bg);
    }

    /* ===== RESULTS PANEL ===== */
    .results-panel {
      width: 320px;
      background: rgba(8, 14, 26, 0.92);
      backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.3s ease;
      z-index: 5;
    }

    .results-panel.hidden {
      width: 0;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .result-count {
      font-size: 12px;
      background: rgba(0, 212, 255, 0.1);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    /* ===== LEGEND ===== */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.blue {
      background: #2a81cb;
      box-shadow: 0 0 6px #2a81cb80;
    }

    .legend-dot.green {
      background: #10b981;
      box-shadow: 0 0 6px #10b98180;
    }

    .legend-dot.red {
      background: #ef4444;
      box-shadow: 0 0 6px #ef444480;
    }

    /* ===== RESULTS LIST ===== */
    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .results-list::-webkit-scrollbar {
      width: 4px;
    }

    .results-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .result-card:hover {
      background: var(--surface-h);
      border-color: rgba(255, 255, 255, 0.14);
      transform: translateX(-2px);
    }

    .result-card.hospital:hover {
      border-color: rgba(239, 68, 68, 0.3);
    }

    .result-card.pharmacy:hover {
      border-color: rgba(16, 185, 129, 0.3);
    }

    .result-card-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .result-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .result-badge.hospital {
      background: rgba(239, 68, 68, 0.12);
    }

    .result-badge.pharmacy {
      background: rgba(16, 185, 129, 0.12);
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-type {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .result-type.hospital {
      color: #f87171;
    }

    .result-type.pharmacy {
      color: var(--green);
    }

    .directions-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      flex-shrink: 0;
      margin-left: auto;
    }

    .directions-btn:hover {
      color: var(--accent);
      border-color: rgba(0, 212, 255, 0.3);
    }

    /* ===== STATUS STATES ===== */
    .status-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .status-msg .status-icon {
      font-size: 36px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ===== MAP OVERLAY LEGEND (floating) ===== */
    .map-legend {
      position: absolute;
      bottom: 28px;
      left: 24px;
      z-index: 400;
      background: rgba(8, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-legend-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ===== TOGGLE PANEL BTN ===== */
    .toggle-panel-btn {
      position: absolute;
      top: 50%;
      right: 320px;
      transform: translateY(-50%);
      z-index: 400;
      background: rgba(8, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 8px 0 0 8px;
      color: var(--muted);
      padding: 10px 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }

    .toggle-panel-btn:hover {
      color: var(--text);
      background: var(--surface-h);
    }

    .toggle-panel-btn.panel-hidden {
      right: 0;
      border-radius: 8px 0 0 8px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="logo" href="dashboard.html">
          <div class="logo-icon">🩺</div>
          <span class="logo-text">SafetyFirst</span>
        </a>
        <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">☰</button>
      </div>

      <span class="nav-section-label">Main</span>
      <nav>
        <ul>
          <li>
            <a id="dashboardBtn" class="nav-item" href="dashboard.html">
              <span class="nav-icon">🏠</span>
              <span class="nav-label">Dashboard</span>
            </a>
          </li>
          <li>
            <a id="nearbyBtn" class="nav-item active" href="nearby-store.html">
              <span class="nav-icon">🏥</span>
              <span class="nav-label">Nearby Hospital</span>
            </a>
          </li>
          <li>
            <a class="nav-item" href="profile.html">
              <span class="nav-icon">👤</span>
              <span class="nav-label">Profile</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
          <span>🚪</span>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- ===== MAP AREA ===== -->
    <div class="map-area">

      <!-- Topbar -->
      <div class="topbar">
        <div>
          <h1>🏥 Nearby Hospitals & Pharmacies</h1>
          <div class="topbar-sub" id="locationLabel">Waiting for location…</div>
        </div>
        <div class="topbar-controls">
          <button class="filter-btn active-filter" id="filterAll" onclick="setFilter('all')">🗺️ All</button>
          <button class="filter-btn" id="filterHospital" onclick="setFilter('hospital')">🏥 Hospitals</button>
          <button class="filter-btn" id="filterPharmacy" onclick="setFilter('pharmacy')">💊 Pharmacies</button>
          <select class="radius-select" id="radiusSelect" onchange="changeRadius()">
            <option value="3000">3 km radius</option>
            <option value="5000">5 km radius</option>
            <option value="7000" selected>7 km radius</option>
            <option value="10000">10 km radius</option>
          </select>
          <button class="locate-btn" onclick="locateUser()">📍 Locate Me</button>
        </div>
      </div>

      <!-- Map + Results -->
      <div class="content-row" style="position:relative;">
        <div id="map"></div>

        <!-- Floating Legend -->
        <div class="map-legend">
          <div class="map-legend-title">Legend</div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot blue"></div> You
            </div>
            <div class="legend-item">
              <div class="legend-dot green"></div> Pharmacy
            </div>
            <div class="legend-item">
              <div class="legend-dot red"></div> Hospital
            </div>
          </div>
        </div>

        <!-- Toggle Panel -->
        <button class="toggle-panel-btn" id="togglePanelBtn" onclick="toggleResultsPanel()"
          title="Toggle results">◀</button>

        <!-- Results Panel -->
        <div class="results-panel" id="resultsPanel">
          <div class="panel-header">
            <div class="panel-header-row">
              <span class="panel-title">Nearby Results</span>
              <span class="result-count" id="resultCount">0 found</span>
            </div>
            <div class="legend">
              <div class="legend-item">
                <div class="legend-dot blue"></div> You
              </div>
              <div class="legend-item">
                <div class="legend-dot green"></div> Pharmacy
              </div>
              <div class="legend-item">
                <div class="legend-dot red"></div> Hospital
              </div>
            </div>
          </div>
          <div class="results-list" id="resultsList">
            <div class="status-msg">
              <div class="status-icon">📍</div>
              <div>Click <strong>Locate Me</strong> to find nearby hospitals &amp; pharmacies.</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // ── Auth guard ──
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) window.location.href = 'login.html';

    // ── Sidebar collapse ──
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // ── Logout ──
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // ── Role-based nav ──
    if (user && user.role === 'admin') {
      ['dashboardBtn', 'nearbyBtn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
    }

    // ── Map Setup ──
    const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // ── Icons ──
    const makeIcon = (color) => L.icon({
      iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41], iconAnchor: [12, 41],
      popupAnchor: [1, -34], shadowSize: [41, 41]
    });
    const icons = { blue: makeIcon('blue'), green: makeIcon('green'), red: makeIcon('red') };

    // ── State ──
    let allMarkers = [];
    let userMarker = null;
    let currentFilter = 'all';
    let userLat = null, userLon = null;

    // ── Filter ──
    function setFilter(type) {
      currentFilter = type;
      ['all', 'hospital', 'pharmacy'].forEach(t => {
        document.getElementById('filter' + t.charAt(0).toUpperCase() + t.slice(1))
          .classList.toggle('active-filter', t === type);
      });
      allMarkers.forEach(({ marker, type: mType }) => {
        if (type === 'all' || mType === type) {
          marker.addTo(map);
        } else {
          map.removeLayer(marker);
        }
      });
      renderList();
    }

    // ── Change Radius ──
    function changeRadius() {
      if (userLat !== null) fetchNearby(userLat, userLon);
    }

    // ── Render Results List ──
    function renderList() {
      const list = document.getElementById('resultsList');
      const filtered = allMarkers.filter(m => currentFilter === 'all' || m.type === currentFilter);
      document.getElementById('resultCount').textContent = filtered.length + ' found';

      if (filtered.length === 0) {
        list.innerHTML = `<div class="status-msg"><div class="status-icon">🔍</div><div>No results for this filter.</div></div>`;
        return;
      }

      list.innerHTML = filtered.map((item, i) => `
        <div class="result-card ${item.type}" onclick="flyTo(${i})">
          <div class="result-card-row">
            <div class="result-badge ${item.type}">${item.type === 'hospital' ? '🏥' : '💊'}</div>
            <div class="result-info">
              <div class="result-name" title="${item.name}">${item.name}</div>
              <div class="result-type ${item.type}">${item.type === 'hospital' ? 'Hospital' : 'Pharmacy'}</div>
            </div>
            <button class="directions-btn" onclick="event.stopPropagation(); openDirections(${item.lat}, ${item.lon})">↗ Go</button>
          </div>
        </div>
      `).join('');

      // store filtered index → real index mapping for flyTo
      window._filteredMarkers = filtered;
    }

    function flyTo(i) {
      const item = window._filteredMarkers[i];
      if (!item) return;
      map.flyTo([item.lat, item.lon], 16, { duration: 1.2 });
      item.marker.openPopup();
    }

    function openDirections(lat, lon) {
      if (userLat !== null) {
        window.open(`https://www.openstreetmap.org/directions?from=${userLat},${userLon}&to=${lat},${lon}`, '_blank');
      } else {
        window.open(`https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=16`, '_blank');
      }
    }

    // ── Fetch Nearby ──
    async function fetchNearby(lat, lon) {
      // Remove old markers
      allMarkers.forEach(({ marker }) => map.removeLayer(marker));
      allMarkers = [];

      const list = document.getElementById('resultsList');
      list.innerHTML = `<div class="status-msg"><div class="spinner"></div><div>Searching nearby…</div></div>`;
      document.getElementById('resultCount').textContent = '…';

      const radius = document.getElementById('radiusSelect').value;
      const url = `https://overpass-api.de/api/interpreter?data=[out:json];(node["amenity"="pharmacy"](around:${radius},${lat},${lon});node["amenity"="hospital"](around:${radius},${lat},${lon}););out;`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        data.elements.forEach(el => {
          const isHospital = el.tags.amenity === 'hospital';
          const type = isHospital ? 'hospital' : 'pharmacy';
          const name = el.tags.name || (isHospital ? 'Unknown Hospital' : 'Unknown Pharmacy');
          const icon = isHospital ? icons.red : icons.green;

          const marker = L.marker([el.lat, el.lon], { icon })
            .bindPopup(`
              <div style="font-family:Inter,sans-serif;font-size:13px;min-width:160px;">
                <strong style="font-size:14px;">${name}</strong><br>
                <span style="color:${isHospital ? '#f87171' : '#10b981'}">${isHospital ? '🏥 Hospital' : '💊 Pharmacy'}</span>
                <br><br>
                <a href="https://www.openstreetmap.org/directions?from=${lat},${lon}&to=${el.lat},${el.lon}"
                  target="_blank"
                  style="color:#00d4ff;font-size:12px;text-decoration:none;">↗ Get Directions</a>
              </div>
            `);

          allMarkers.push({ marker, type, name, lat: el.lat, lon: el.lon });
        });

        // Apply current filter
        setFilter(currentFilter);

      } catch (err) {
        list.innerHTML = `<div class="status-msg"><div class="status-icon">⚠️</div><div>Failed to load nearby places. Please try again.</div></div>`;
        console.error(err);
      }
    }

    // ── Locate User ──
    function locateUser() {
      const label = document.getElementById('locationLabel');
      label.textContent = 'Getting your location…';

      if (!('geolocation' in navigator)) {
        label.textContent = 'Geolocation not supported.';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          label.textContent = `📍 ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;

          map.flyTo([userLat, userLon], 14, { duration: 1.5 });

          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.marker([userLat, userLon], { icon: icons.blue })
            .addTo(map)
            .bindPopup('<b style="font-family:Inter,sans-serif">📍 You are here</b>')
            .openPopup();

          await fetchNearby(userLat, userLon);
        },
        (err) => {
          label.textContent = 'Location access denied.';
          console.warn(err);
        }
      );
    }

    // ── Results Panel Toggle ──
    function toggleResultsPanel() {
      const panel = document.getElementById('resultsPanel');
      const btn = document.getElementById('togglePanelBtn');
      panel.classList.toggle('hidden');
      const hidden = panel.classList.contains('hidden');
      btn.textContent = hidden ? '▶' : '◀';
      btn.classList.toggle('panel-hidden', hidden);
      // force map resize
      setTimeout(() => map.invalidateSize(), 350);
    }

    // ── Auto-locate on load ──
    window.addEventListener('load', locateUser);
  </script>
</body>

</html>
