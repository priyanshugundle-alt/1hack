<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - SafetyFirst AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-dark: #000000;
      --surface: #0a0a0a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #8a8a8a;
      --accent: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 60px 0;
    }

    .ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120vw;
      height: 120vh;
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(200, 200, 255, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(100, 100, 255, 0.02) 0%, transparent 60%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      animation: gradientMove 25s infinite alternate ease-in-out;
    }

    @keyframes gradientMove {
      0% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }

      100% {
        transform: translate(-50%, -45%) scale(1.2) rotate(3deg);
      }
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.035;
      z-index: 9999;
      pointer-events: none;
    }

    .nubien-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      position: relative;
      z-index: 10;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }

    .text-gradient {
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.5) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    .custom-input {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: white;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .custom-input:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    select.custom-input option {
      background-color: #0f0f0f;
      color: white;
      padding: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000000;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: none;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .reveal-up {
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes revealUp {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo-box {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: black;
      margin: 0 auto 32px auto;
    }

    .back-link {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 20;
      color: var(--text-secondary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
      text-decoration: none;
    }

    .back-link:hover {
      color: white;
    }

    #patientFields {
      overflow: hidden;
      transition: max-height 0.5s ease-in-out, opacity 0.4s ease-in-out;
      max-height: 800px;
      /* high default */
      opacity: 1;
    }

    #patientFields.hidden-smooth {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      margin-bottom: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-top: none;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="noise-overlay"></div>
  <a href="index.html" class="back-link hidden md:flex">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
    </svg>
    Back to Platform
  </a>

  <div class="ambient-glow"></div>

  <div class="nubien-card p-10 w-full max-w-xl reveal-up mx-4 my-10">

    <div class="logo-box">S</div>
    <h2 class="text-3xl font-extrabold mb-2 text-center text-gradient">Build your profile.</h2>
    <p class="text-[var(--text-secondary)] text-center mb-10 text-sm">Join the next generation of intelligent healthcare
      infrastructure.</p>

    <form onsubmit="event.preventDefault(); signup();">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
        <div>
          <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Full
            Name</label>
          <input id="name" type="text" placeholder="John Doe" class="w-full p-3.5 rounded-xl custom-input" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Email
            Address</label>
          <input id="email" type="email" placeholder="john@example.com" class="w-full p-3.5 rounded-xl custom-input"
            required>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <div>
          <label
            class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Password</label>
          <input id="password" type="password" placeholder="••••••••" class="w-full p-3.5 rounded-xl custom-input"
            required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-[var(--text-secondary)] uppercase tracking-wider mb-2">Account
            Privilege Tier</label>
          <select id="role" class="w-full p-3.5 rounded-xl custom-input bg-transparent cursor-pointer">
            <option value="user">Patient Core</option>
            <option value="admin">System Admin</option>
          </select>
        </div>
      </div>

      <!-- Expanding Patient Profile Info -->
      <div id="patientFields" class="mb-8 border-t border-[var(--border)] pt-8 mt-2">
        <span class="text-[var(--text-secondary)] font-semibold uppercase text-xs mb-5 block">Optional Medical
          Metadata</span>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-5 mb-5">
          <div>
            <label class="block text-xs text-[var(--text-secondary)] mb-2">Date of Birth</label>
            <input id="dob" type="date" class="w-full p-3 rounded-lg custom-input text-sm text-[var(--text-secondary)]">
          </div>
          <div>
            <label class="block text-xs text-[var(--text-secondary)] mb-2">Height (cm)</label>
            <input id="height" type="text" placeholder="175" class="w-full p-3 rounded-lg custom-input text-sm">
          </div>
          <div>
            <label class="block text-xs text-[var(--text-secondary)] mb-2">Weight (kg)</label>
            <input id="weight" type="text" placeholder="70" class="w-full p-3 rounded-lg custom-input text-sm">
          </div>
        </div>

        <div class="mb-5">
          <label class="block text-xs text-[var(--text-secondary)] mb-2">Known Allergies (CSV Formatting)</label>
          <input id="allergies" type="text" placeholder="e.g. Peanuts, Penicillin"
            class="w-full p-3 rounded-lg custom-input text-sm">
        </div>

        <div>
          <label class="block text-xs text-[var(--text-secondary)] mb-2">Primary Residential Delivery Address</label>
          <input id="address" type="text" placeholder="123 Automation Blvd, Tech City"
            class="w-full p-3 rounded-lg custom-input text-sm">
        </div>
      </div>

      <button type="submit"
        class="w-full mt-2 btn-primary py-4 rounded-full text-[0.95rem] flex justify-center items-center">
        Initialize the System
        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </button>
    </form>

    <p class="text-sm text-center mt-8 text-[var(--text-secondary)]">
      Already verified?
      <a href="login.html" class="text-white font-medium hover:underline transition-colors ml-1">Authenticate.</a>
    </p>
  </div>

  <script>
    document.getElementById('role').addEventListener('change', function () {
      const patientFields = document.getElementById('patientFields');
      if (this.value === 'admin') {
        patientFields.classList.add('hidden-smooth');
      } else {
        patientFields.classList.remove('hidden-smooth');
      }
    });

    async function signup() {
      const btn = document.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-2 border-2 border-black border-t-transparent rounded-full inline-block" viewBox="0 0 24 24"></svg> Provisioning Server...';
      btn.disabled = true;

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            email,
            password,
            role: document.getElementById("role").value,
            dob: document.getElementById("dob").value,
            height: document.getElementById("height").value,
            weight: document.getElementById("weight").value,
            allergies: document.getElementById("allergies").value,
            address: document.getElementById("address").value
          })
        });

        const data = await res.json();
        console.log("Signup response:", data);

        if (data.success) {
          btn.innerHTML = 'System Online ✓';
          btn.style.backgroundColor = '#22c55e';
          btn.style.color = 'white';

          setTimeout(() => {
            window.location.href = "login.html";
          }, 500);

        } else {
          alert(data.message);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Signup failed. Please try again.");
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
